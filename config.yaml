  - D5_smart_home_readiness
  - D6_property_risk_setup
  - D7_business_continuity_bridge

# ---------------------------------------------------------------------------
# Cadence (LaunchAgent-Pattern, Phase-2 Pflicht)
# ---------------------------------------------------------------------------
cadence:
  weekly_mo_07_00:
    enabled: false  # Phase-2 (nach Pilot-Erfolg)
    trigger: "LaunchAgent ~/Library/LaunchAgents/com.kemmer.df-109.plist"
    action: "Read Decision-Card-Anker + Update Status-Dashboard JSON + Diff-Report"
  monthly_review:
    enabled: true   # Phase-1
    action: "Martin Review-Trigger fuer Phase-Update (Phronesis-Pflicht)"

# ---------------------------------------------------------------------------
# Pending Phronesis Martin (4 Items aus SPEC)
# ---------------------------------------------------------------------------
pending_phronesis:
  - id: P-DF109-1
    item: "USCIS-API Tier-2 Approval (Real-Lookup nur via Steueranwalt-LexVance erlaubt?)"
    blocked_until_decided: true
  - id: P-DF109-2
    item: "§ 6 AStG Stichtag fix oder dynamisch (Wegzugsdatum ist Phronesis)"
    blocked_until_decided: false
  - id: P-DF109-3
    item: "SPT-Tage-Tracker Source (Calendar/Manual/Steuerberater?)"
    blocked_until_decided: true
  - id: P-DF109-4
    item: "Property-Risk-Insurance-Binder Anker (US-Anwalt-Output?)"
    blocked_until_decided: false

# ---------------------------------------------------------------------------
# Trinity-Pattern (rules/trinity-evaluatorisch)
# ---------------------------------------------------------------------------
trinity_compliance:
  options_presented_in_spec: true
  variants:
    - conservative: "Mock-Mode default, Pareto-Phase-1 only (D1+D2+D3)"
    - aggressive: "DF_109_REAL_API_ENABLED=true + Phase-2 nach Phronesis"
    - contrarian: "Sunset DF-109 wenn Cape-Coral-Phase abgeschlossen (Owner-Status FL)"

